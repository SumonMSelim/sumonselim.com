server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ──────────────────────────────────────
    # (Cloudflare Pages handles these in production via public/_headers)
    add_header X-Frame-Options          "SAMEORIGIN"                               always;
    add_header X-Content-Type-Options   "nosniff"                                  always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Cache: immutable fingerprinted assets ─────────────────
    location ~* \.(?:js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Routing ───────────────────────────────────────────────
    # try_files: serve real file → directory index → .html extension
    # (covers both Astro SSG pre-rendered pages and SPA fallback)
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── Error pages ───────────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
