# ─────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT  —  hot-reload dev server via bind mount
#
# Quick start:
#   docker compose up            # start Astro dev server
#   docker compose up --build    # force image rebuild (new deps, etc.)
#   docker compose down          # stop & remove containers
#   docker compose logs -f web   # tail Astro logs
#
# URLs:
#   Astro site    → http://localhost:4321
#
# Copy .env.example → .env.local for local overrides.
# ─────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      target: dev        # Uses the lightweight "dev" stage from Dockerfile
    ports:
      - "${APP_PORT:-4321}:${APP_PORT:-4321}"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-true}
      - WATCHPACK_POLLING=${WATCHPACK_POLLING:-true}
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${APP_PORT:-4321}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Named volume persists node_modules between container restarts
volumes:
  node_modules:
